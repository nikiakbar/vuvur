services:
  portal:
    build:
      context: ./portal
    # image: nikiakbar/vuvur:portal
    pull_policy: always
    ports:
      - "3680:80"
    environment:
      - ZOOM_LEVEL=2.0
      - API_SECRET_KEY=vuvur_dev
      
  api:
    build:
      context: ./api
    # image: nikiakbar/vuvur:api
    # pull_policy: always
    ports:
      - "3681:5000"
    volumes:
      # Core requirements - shared data volume for database
      - vuvur_local_dev:/app/data

      # Required, for liked and recyclebin feature.
      - /mnt/z/Locals/system/outputs/liked:/mnt/gallery/liked
      - /mnt/z/Locals/system/outputs/recyclebin:/mnt/gallery/recyclebin
      
      # - /mnt/z/Locals/system/outputs/txt2img-images:/mnt/gallery/txt2img-images
      # - /mnt/z/Locals/system/outputs/videos:/mnt/gallery/videos
      
      - /mnt/z/Locals/system/outputs/samples-images:/mnt/gallery/samples-images
      - /mnt/z/Locals/system/outputs/samples-vids:/mnt/gallery/videos

    # restart: unless-stopped
    environment:
      # Set to 1 hour (3600s). Set to 0 to disable periodic scanning.
      - WORKERS=2
      - GALLERY_BATCH_SIZE=20
      - RANDOM_PRELOAD_COUNT=3
      - ENABLE_LOGIN=false
      - API_SECRET_KEY=vuvur_dev

  scanner:
    build:
      context: ./api
    command: python scanner_service.py
    # Use volumes_from to inherit all volumes from API service
    # Scanner will scan whatever is mounted at /mnt/gallery
    volumes_from:
      - api
    # restart: unless-stopped
    environment:
      - INITIAL_SCAN_MAX_MEDIA=10000
      - SCAN_INTERVAL=30
    depends_on:
      - api

volumes:
  vuvur_local_dev: