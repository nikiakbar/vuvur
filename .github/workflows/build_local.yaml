name: Build and Push Docker Images

on:
  push:
    branches: [ "main", "dev" ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: nixypcwsl

    strategy:
      matrix:
        include:
          - service: api
            context: ./api
            dockerfile: ./api/Dockerfile
            tag_name: api
          - service: portal
            context: ./portal
            dockerfile: ./portal/Dockerfile
            tag_name: portal

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set image tag suffix
        id: set_suffix
        run: |
          if [ "${{ github.ref_name }}" == "main" ]; then
            echo "tag_suffix=main" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref_name }}" == "dev" ]; then
            echo "tag_suffix=dev" >> $GITHUB_OUTPUT
          fi

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.service }} image
        if: steps.set_suffix.outputs.tag_suffix != ''
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/vuvur:${{ matrix.tag_name }}-${{ steps.set_suffix.outputs.tag_suffix }}
